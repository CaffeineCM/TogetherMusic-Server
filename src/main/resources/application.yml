server:
  port: 8080

spring:
  application:
    name: together-music
  datasource:
    url: jdbc:postgresql://192.168.5.220:6432/together_music
    username: xwf
    password: xwf980521
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 110MB

sa-token:
  token-name: Authorization
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  token-prefix: Bearer
  is-log: false

together-music:
  storage:
    type: local
    local:
      base-dir: /data/tm-uploads
      base-url: http://localhost:8080/uploads
  upload:
    max-file-size: 104857600
    allowed-mime-types:
      - audio/mpeg
      - audio/flac
      - audio/wav
      - audio/ogg
      - audio/mp4
  room:
    ip-house-limit: 3
    max-house-size: 32
  music:
    vote-rate: 0.3
    expire-time: 1200000
    playlist-size: 100
  music-api:
    netease: ${NETEASE_API_BASE_URL:http://localhost:3000}
    qq: ${QQ_MUSIC_API_BASE_URL:http://localhost:3300}
    kugou: ${KUGOU_API_BASE_URL:http://localhost:3400}
